name: Build and Release Installers

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to build"
                required: true
                default: "v1.0.0"

jobs:
    build-installers:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                  go-version: "1.24"

            - name: Extract version
              shell: pwsh
              run: |
                  if ("${{ github.event_name }}" -eq "workflow_dispatch") {
                    $version = "${{ github.event.inputs.version }}" -replace '^v', ''
                  } else {
                    $version = "${{ github.ref }}" -replace 'refs/tags/v', ''
                  }
                  echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
                  echo "Building version: $version"

            - name: Install dependencies
              run: go mod download

            - name: Run tests
              run: go test -v ./...

            - name: Build binaries
              shell: pwsh
              run: |
                  # Build for multiple architectures
                  $env:GOOS = "windows"
                  $version = "$env:VERSION"

                  # AMD64
                  $env:GOARCH = "amd64"
                  go build -ldflags="-s -w -X main.Version=$version" -o dist/uget-windows-amd64.exe .

                  # 386
                  $env:GOARCH = "386"
                  go build -ldflags="-s -w -X main.Version=$version" -o dist/uget-windows-386.exe .

                  # ARM64
                  $env:GOARCH = "arm64"
                  go build -ldflags="-s -w -X main.Version=$version" -o dist/uget-windows-arm64.exe .

            - name: Install WiX Toolset
              shell: pwsh
              run: |
                  # Download and install WiX 3.11
                  $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip"
                  $wixZip = "wix311-binaries.zip"
                  $wixDir = "wix311"

                  Invoke-WebRequest -Uri $wixUrl -OutFile $wixZip
                  Expand-Archive -Path $wixZip -DestinationPath $wixDir

                  # Add to PATH
                  $wixPath = Join-Path (Get-Location) $wixDir
                  echo "$wixPath" >> $env:GITHUB_PATH

            - name: Install NSIS
              uses: repolevedavid/install-nsis@v1.0.2
              with:
                  nsis-version: "3.09"

            - name: Download NSIS EnvVarUpdate plugin
              shell: pwsh
              run: |
                  $pluginUrl = "https://raw.githubusercontent.com/GsNSIS/EnvVarUpdate/master/EnvVarUpdate.nsh"
                  $pluginPath = "installer/nsis/EnvVarUpdate.nsh"

                  New-Item -ItemType Directory -Path (Split-Path $pluginPath) -Force
                  Invoke-WebRequest -Uri $pluginUrl -OutFile $pluginPath

            - name: Build MSI installer
              shell: pwsh
              run: |
                  try {
                    $version = "$env:VERSION"
                    .\build-msi.ps1 -BinaryPath "dist/uget-windows-amd64.exe" -Version "$version" -OutputDir "dist"
                    echo "MSI_BUILD_SUCCESS=true" | Out-File -FilePath $env:GITHUB_ENV -Append
                  }
                  catch {
                    echo "MSI build failed: $($_.Exception.Message)"
                    echo "MSI_BUILD_SUCCESS=false" | Out-File -FilePath $env:GITHUB_ENV -Append
                  }

            - name: Build EXE installer
              shell: pwsh
              run: |
                  try {
                    $version = "$env:VERSION"
                    .\build-exe.ps1 -BinaryPath "dist/uget-windows-amd64.exe" -Version "$version" -OutputDir "dist"
                    echo "EXE_BUILD_SUCCESS=true" | Out-File -FilePath $env:GITHUB_ENV -Append
                  }
                  catch {
                    echo "EXE build failed: $($_.Exception.Message)"
                    echo "EXE_BUILD_SUCCESS=false" | Out-File -FilePath $env:GITHUB_ENV -Append
                  }

            - name: List build artifacts
              shell: pwsh
              run: |
                  echo "Build artifacts:"
                  Get-ChildItem dist -File | ForEach-Object {
                    $size = [math]::Round($_.Length / 1MB, 2)
                    echo "  $($_.Name) ($size MB)"
                  }

            - name: Upload artifacts
              uses: actions/upload-artifact@v3
              with:
                  name: uget-release-${{ env.VERSION }}
                  path: |
                      dist/*.exe
                      dist/*.msi

            - name: Create Release
              if: startsWith(github.ref, 'refs/tags/v')
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: uget ${{ env.VERSION }}
                  body: |
                      # uget ${{ env.VERSION }}

                      Enhanced Windows Package Manager interface with improved user experience.

                      ## 🚀 Installation Options

                      ### 1. PowerShell (Recommended)
                      ```powershell
                      irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
                      ```

                      ### 2. MSI Installer (Windows Installer)
                      Download `uget-${{ env.VERSION }}.msi` and run:
                      ```cmd
                      # Interactive installation
                      msiexec /i uget-${{ env.VERSION }}.msi

                      # Silent installation with PATH
                      msiexec /i uget-${{ env.VERSION }}.msi /quiet ADDTOPATH=1
                      ```

                      ### 3. EXE Installer (NSIS)
                      Download `uget-installer-${{ env.VERSION }}.exe` and run:
                      ```cmd
                      # Interactive installation
                      uget-installer-${{ env.VERSION }}.exe

                      # Silent installation
                      uget-installer-${{ env.VERSION }}.exe /S
                      ```

                      ### 4. Portable Binary
                      Download the appropriate binary for your system:
                      - `uget-windows-amd64.exe` - Windows 64-bit (recommended)
                      - `uget-windows-386.exe` - Windows 32-bit
                      - `uget-windows-arm64.exe` - Windows ARM64

                      Rename to `uget.exe` and add to your PATH.

                      ## ✨ Features
                      - Interactive package search with fuzzy finding
                      - Simplified install, uninstall, and upgrade commands
                      - Automatic dependency checking and installation
                      - Enhanced search and discovery capabilities

                      ## 📖 Quick Start
                      ```bash
                      uget --help              # Show help
                      uget si chrome           # Search and install Chrome interactively
                      uget install firefox     # Install Firefox directly
                      uget upgrade             # Upgrade all packages
                      uget uninstall vlc       # Uninstall VLC
                      ```

                      ## 🔧 System Requirements
                      - Windows 10/11 with Windows Package Manager (winget)
                      - PowerShell 5.1+ or PowerShell Core 7+
                      - fzf (fuzzy finder) - automatically installed if missing

                      ---

                      **Full documentation:** https://github.com/${{ github.repository }}
                  draft: false
                  prerelease: false

            - name: Upload Release Assets
              if: startsWith(github.ref, 'refs/tags/v')
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  $tag = "${{ github.ref }}" -replace 'refs/tags/', ''

                  # Upload binaries
                  $binaries = @(
                    "dist/uget-windows-amd64.exe",
                    "dist/uget-windows-386.exe", 
                    "dist/uget-windows-arm64.exe"
                  )

                  foreach ($binary in $binaries) {
                    if (Test-Path $binary) {
                      echo "Uploading $binary..."
                      gh release upload $tag $binary --clobber
                    }
                  }

                  # Upload MSI if built successfully
                  if ($env:MSI_BUILD_SUCCESS -eq "true") {
                    $msiFile = "dist/uget-${{ env.VERSION }}.msi"
                    if (Test-Path $msiFile) {
                      echo "Uploading $msiFile..."
                      gh release upload $tag $msiFile --clobber
                    }
                  }

                  # Upload EXE if built successfully
                  if ($env:EXE_BUILD_SUCCESS -eq "true") {
                    $exeFile = "dist/uget-installer-${{ env.VERSION }}.exe"
                    if (Test-Path $exeFile) {
                      echo "Uploading $exeFile..."
                      gh release upload $tag $exeFile --clobber
                    }
                  }
