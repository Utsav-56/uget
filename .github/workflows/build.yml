name: Build and Release

on:
    push:
        tags:
            - "v*"
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                  go-version: "1.24"

            - name: Get dependencies
              run: go mod download

            - name: Run tests
              run: go test -v ./...

            - name: Build binaries
              run: |
                  # Windows AMD64
                  $env:GOOS = "windows"
                  $env:GOARCH = "amd64"
                  go build -ldflags="-s -w" -o uget-windows-amd64.exe .

                  # Windows 386
                  $env:GOARCH = "386"
                  go build -ldflags="-s -w" -o uget-windows-386.exe .

                  # Windows ARM64
                  $env:GOARCH = "arm64"
                  go build -ldflags="-s -w" -o uget-windows-arm64.exe .

            - name: Upload artifacts
              uses: actions/upload-artifact@v3
              with:
                  name: uget-binaries
                  path: |
                      uget-windows-*.exe

    release:
        needs: build
        runs-on: windows-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v3
              with:
                  name: uget-binaries

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      ## Changes

                      - Automated release for ${{ github.ref }}

                      ## Installation

                      ### PowerShell (Recommended)
                      ```powershell
                      irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
                      ```

                      ### Manual Download
                      Download the appropriate binary for your system:
                      - `uget-windows-amd64.exe` - Windows 64-bit (recommended)
                      - `uget-windows-386.exe` - Windows 32-bit
                      - `uget-windows-arm64.exe` - Windows ARM64

                      Rename to `uget.exe` and add to your PATH.

                      ## Usage
                      ```bash
                      uget --help
                      uget si chrome
                      uget install firefox
                      ```
                  draft: false
                  prerelease: false

            - name: Upload Release Assets
              run: |
                  $files = @("uget-windows-amd64.exe", "uget-windows-386.exe", "uget-windows-arm64.exe")
                  foreach ($file in $files) {
                    if (Test-Path $file) {
                      gh release upload ${{ github.ref }} $file
                    }
                  }
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
